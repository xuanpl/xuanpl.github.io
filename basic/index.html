<meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{--primary:#2c3e50;--accent:#d4af37;--bg:#f8f9fa;--card:#ffffff;--text:#2c3e50;--danger:#e74c3c;--sub:#525c68;--mood-bg:#e9ecef;--nav-height:48px;--energy:212, 175, 55;--healing:157, 176, 163;--thinking:92, 122, 153;--release:194, 107, 99;--melancholy:138, 136, 148;--custom:163, 160, 152}[data-theme="dark"]{--primary:#ecf0f1;--accent:#f1c40f;--bg:#121212;--card:#1e1e1e;--text:#e0e0e0;--mood-bg:#2c2c2c}@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){--primary:#ecf0f1;--accent:#f1c40f;--bg:#121212;--card:#1e1e1e;--text:#e0e0e0;--mood-bg:#2c2c2c}}*{box-sizing:border-box;-webkit-tap-highlight-color:#fff0;outline:none}html,body{height:100%;width:100%;margin:0;padding:0;background:var(--bg);font-family:-apple-system,system-ui,sans-serif;color:var(--text);overflow-x:hidden;transition:background 0.3s}.page,#d-page{transition:none}#d-page{display:none;position:fixed;inset:0;width:100%;height:100dvh;min-height:-webkit-fill-available;background:var(--bg);z-index:100;opacity:0;padding-top:env(safe-area-inset-top);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}#d-page.active{opacity:1;transform:translateX(0)}#h-page.fade-out{opacity:0;pointer-events:none}.static-nav{position:relative;width:100%;min-height:var(--nav-height);background:var(--bg);border-bottom:1px solid rgb(0 0 0 / .05);display:flex;justify-content:space-between;align-items:center;padding:5px 10px}.cal-section{margin:8px 15px;border-radius:20px;background:var(--card);padding-bottom:8px;box-shadow:0 5px 25px rgb(0 0 0 / .03)}.cal-header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;gap:1px;transition:opacity 0.15s ease-out}.cal-grid.fade{opacity:0}.day{height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;position:relative;transition:background-color 0.15s ease,transform 0.1s cubic-bezier(.4,0,.2,1);-webkit-tap-highlight-color:#fff0;user-select:none;-webkit-user-select:none}.day span:first-child{font-size:17px;font-weight:600}.day .l{font-size:12px;margin-top:0;white-space:nowrap;letter-spacing:-.2px;transform:scale(.82)}.day.recorded{background:var(--mood-bg)}.day.is-today{background:var(--primary)!important;color:var(--bg)}.day.recorded::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;background:var(--accent);border-radius:50%}.day:active{transform:scale(.92);background-color:var(--mood-bg)}.day.is-today:active{transform:scale(.92);background-color:var(--primary)!important;opacity:.8}.day.recorded:active{background-color:rgb(0 0 0 / .08)}[data-theme="dark"] .day.recorded:active{background-color:rgb(255 255 255 / .08)}.btn-pill{height:32px;display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box;font-size:13px;font-weight:600;padding:0 16px;border-radius:16px;border:none;background:var(--mood-bg);color:var(--primary);cursor:pointer;transition:transform 0.1s ease,filter 0.1s ease;white-space:nowrap;flex-shrink:0}.btn-pill:active{transform:scale(.95);filter:brightness(.9)}.btn-save{background:var(--primary);color:var(--bg)}.icon-btn{background:none;border:none;padding:8px;display:flex;align-items:center;justify-content:center;transition:transform 0.1s ease,background-color 0.1s ease;border-radius:50%}.icon-btn svg{width:18px;height:18px;fill:var(--sub)}.icon-btn:active{transform:scale(.85);background-color:var(--mood-bg)}.editor-box{width:100%;min-height:30vh;font-size:18px;line-height:1.8;letter-spacing:.5px;color:var(--text);white-space:pre-wrap;outline:none}.editor-box:empty:before{content:attr(placeholder);color:var(--sub);opacity:.5}.box-header{font-size:12px;font-weight:700;margin:0 0 12px;color:var(--text);display:flex;justify-content:space-between;align-items:center}.growth-grid{display:flex;flex-wrap:wrap;gap:4px}.growth-cell{width:12px;height:12px;border-radius:3px;background:var(--mood-bg);transition:0.3s}.modal{position:fixed;inset:0;background:rgb(0 0 0 / .5);backdrop-filter:blur(8px);z-index:300;display:none;align-items:flex-end;opacity:0;transition:opacity 0.3s cubic-bezier(.4,0,.2,1)}.modal.show{opacity:1}.modal-content{background:var(--card);width:100%;border-radius:25px 25px 0 0;padding:20px;max-height:85vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1)}.modal.show .modal-content{transform:translateY(0)}#auth-layer{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center}#pwd-i{padding:15px;border:none;background:var(--mood-bg);color:var(--text);border-radius:20px;margin-bottom:20px;text-align:center;font-size:24px;width:220px}.setting-row{height:54px;display:flex;align-items:center;justify-content:space-between;background:var(--mood-bg);padding:0 18px;margin-bottom:12px;border-radius:14px;transition:transform 0.15s ease,opacity 0.15s ease;-webkit-tap-highlight-color:#fff0}.setting-row:active{transform:scale(.97);opacity:.8}.modal-content .btn-pill{height:54px!important;width:100%!important;padding:0 18px!important;margin-bottom:12px!important;border-radius:14px!important;font-size:15px!important;box-sizing:border-box}.theme-switch-group{height:54px;display:flex;align-items:center;background:var(--mood-bg);border-radius:12px;padding:4px;margin-bottom:12px}.theme-switch-group .theme-btn{flex:1;padding:10px 0;text-align:center;border-radius:8px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;transition:0.2s}.theme-btn.active{background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgb(0 0 0 / .05)}#mood-grid-main{display:grid!important;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}.mood-tag{display:flex;align-items:center;justify-content:center;height:44px;padding:0 4px;margin:0;border-radius:14px;background:var(--mood-bg);color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s ease;border:1px solid #fff0;white-space:nowrap}.mood-tag.active{background:var(--primary)!important;color:var(--bg)!important;font-weight:600;box-shadow:0 4px 12px rgb(0 0 0 / .1)}.mood-tag.active.f-energy{background:rgb(var(--energy))!important;color:#fff!important}.mood-tag.active.f-healing{background:rgb(var(--healing))!important;color:#fff!important}.mood-tag.active.f-thinking{background:rgb(var(--thinking))!important;color:#fff!important}.mood-tag.active.f-melancholy{background:rgb(var(--melancholy))!important;color:#fff!important}.mood-tag.active.f-release{background:rgb(var(--release))!important;color:#fff!important}.cal-ctrl button{transition:transform 0.1s ease,background-color 0.1s;border-radius:12px}.cal-ctrl button:active{transform:scale(.85);background-color:rgb(0 0 0 / .08)!important}#toast-container{position:fixed;top:env(safe-area-inset-top,20px);left:0;right:0;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none}.toast{padding:12px 24px;border-radius:12px;background:var(--card);color:var(--text);font-size:14px;font-weight:600;box-shadow:0 10px 30px rgb(0 0 0 / .1);border-left:4px solid var(--accent);animation:toast-in 0.3s cubic-bezier(.4,0,.2,1);transition:opacity 0.3s ease,transform 0.3s ease;max-width:90%;text-align:center;word-break:break-word}.toast.t-error{border-left-color:var(--danger)}.toast.t-success{border-left-color:var(--healing)}.toast.fade-out{opacity:0;transform:translateY(-20px) scale(.95)}[data-theme="dark"] .toast{box-shadow:0 10px 30px rgb(0 0 0 / .3);border:1px solid rgb(255 255 255 / .1);border-left:4px solid var(--accent)}[data-theme="dark"] .toast.t-error{border-left-color:var(--danger)}[data-theme="dark"] .toast.t-success{border-left-color:var(--healing)}@keyframes toast-in{0%{opacity:0;transform:translateY(-20px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}#md-tools{position:static!important;transform:none!important;display:flex;gap:8px;width:100%!important;padding:0 0 10px 0!important;margin:0!important;background:transparent!important;border-bottom:none!important;z-index:10}#md-tools button{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0;background:var(--card)!important;border:1px solid var(--mood-bg)!important;border-radius:10px!important;color:var(--text);cursor:pointer;transition:0.15s ease}#md-tools button:active{transform:scale(.92);background:var(--mood-bg)!important}#md-tools svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}@media print{#h-page,.static-nav,#settings-modal,#more-modal,#toast-container,.modal{display:none!important}html,body,.page,#d-page{height:auto!important;min-height:auto!important;max-height:none!important;position:static!important;background:white!important;padding:0!important;margin:0!important;overflow:visible!important}#title-v,#meta-v{break-after:avoid;page-break-after:avoid}#content-v{break-inside:auto;color:black!important}*{filter:none!important}}@media (min-width:768px){body{background:#eef2f5;display:flex;justify-content:center}[data-theme="dark"] body{background:#0a0a0a}.page,#d-page,#auth-layer{position:fixed!important;inset:0!important;margin:20px auto!important;width:100%!important;max-width:480px!important;height:calc(100vh - 40px)!important;border-radius:30px!important;box-shadow:0 20px 60px rgb(0 0 0 / .1);border:1px solid rgb(0 0 0 / .05);overflow-y:auto!important}.modal{position:fixed!important;inset:0!important;margin:20px auto!important;width:100%!important;max-width:480px!important;height:calc(100vh - 40px)!important;border-radius:30px!important;overflow:hidden!important}[data-theme="dark"] .page,[data-theme="dark"] #d-page,[data-theme="dark"] #auth-layer{border:1px solid rgb(255 255 255 / .1);box-shadow:0 20px 60px rgb(0 0 0 / .5)}#toast-container{max-width:480px;margin:0 auto;top:40px}}#mood-trigger-btn{user-select:none;-web mation:fadeOut 0.15s ease-out forwards}
</style>

<body>
<div id="toast-container"></div>
<div id="auth-layer">
    <h2 style="font-weight:200; letter-spacing:10px; margin-bottom: 30px;">拾绪</h2>
    <input type="password" id="pwd-i" placeholder="解锁密码" autocomplete="off" onkeydown="if(event.key==='Enter') checkAuth()">
    <button class="btn-pill btn-save" style="padding: 12px 40px;" onclick="checkAuth()">解锁</button>
</div>

<div id="h-page" class="page">
<div id="ios-survival-banner" style="display: none; background: rgba(231, 76, 60, 0.1); border-bottom: 1px solid rgba(231, 76, 60, 0.2); padding: calc(10px + env(safe-area-inset-top)) 20px 10px; align-items: flex-start; gap: 12px; animation: slideDown 0.4s ease-out;">
    <svg style="width:24px; height:24px; stroke:var(--danger); fill:none; stroke-width:2; flex-shrink:0; margin-top:2px;" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <div style="flex: 1;">
        <div style="font-size: 13px; font-weight: 700; color: var(--danger); margin-bottom: 4px;">严重的数据丢失风险</div>
        <div style="font-size: 11px; color: var(--text); opacity: 0.8; line-height: 1.5; margin-bottom: 8px;">
            在 Safari 中运行超过 7 天未使用，苹果系统将自动摧毁您的所有日记与图片。<br>
            <strong style="color:var(--text)">请务必点击底部「分享 <svg style="width:10px; height:10px; display:inline;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>」图标，选择「添加到主屏幕」。</strong>
        </div>
    </div>
    <button onclick="document.getElementById('ios-survival-banner').style.display='none'" style="background:none; border:none; color:var(--sub); padding:4px; font-size:16px;">✕</button>
</div>
    <div style="padding: calc(15px + env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <h1 style="font-size: 26px; font-weight: 300; margin: 0; letter-spacing: 2px;">拾绪</h1>
            <div id="app-main-title" style="font-size: 13px; color: var(--sub); opacity: 0.7; letter-spacing: 1px; font-weight: 600;">读取中...</div>
        </div>
        <button class="icon-btn" onclick="openModal('settings-modal')">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.13,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.2-0.06,0.47,0.12,0.61l2.03,1.58C4.84,11.36,4.81,11.68,4.81,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.50,0.38,1.03,0.70,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
    </div>

    <div style="display: flex; gap: 20px; padding: 0 20px; margin-bottom: 10px;">
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">累计</span><span id="s-total" style="font-size: 18px; font-weight: bold;">0</span></div>
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">本月</span><span id="s-month" style="font-size: 18px; font-weight: bold;">0</span></div>
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">字数统计</span><span id="s-words" style="font-size: 18px; font-weight: bold;">0</span></div>
    </div>

    <div class="cal-section">
        <div class="cal-header">
            <div id="cal-m-label" style="font-weight: 600; font-size: 18px;"></div>
            <div class="cal-ctrl" style="display: flex; background: none; padding: 3px; border-radius: 18px; gap: 2px;">
                <button style="background:none; color: var(--primary); border:none; padding: 5px 12px; font-size:18px; cursor:pointer;" onclick="moveMonth(-1)">◀</button>
                <button style="background:rgba(0,0,0,0.03); color: var(--accent); border:none; padding: 5px 12px; font-size:16px; border-radius:15px; cursor:pointer;" onclick="goToday()">今天</button>
                <button style="background:none; color: var(--primary); border:none; padding: 5px 12px; font-size:18px; cursor:pointer;" onclick="moveMonth(1)">▶</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--sub); margin-bottom: 8px; font-weight: bold;"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
        <div class="cal-grid" id="cal-g"></div>
    </div>

    <div style="margin: 10px 15px; padding: 15px 18px; background: var(--card); border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.03);">
        <div class="box-header"><span id="growth-title">灵感足迹</span><span id="days-count">0 天</span></div>
        <div class="growth-grid" id="growth-grid"></div>
    </div>

    <div style="margin: 10px 15px;">
        <input type="text" id="search-input" placeholder="搜索..." oninput="filterIndex()" style="width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--card); font-size: 14px;">
        <div id="index-list" style="margin-top:10px;"></div>
        
        <button class="btn-pill btn-save" style="width: 100%; margin-top: 15px; padding: 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="goRandom()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            漫游时光机
        </button>
    </div>
</div>

<div id="d-page">
    <div class="static-nav" style="min-height: 40px; padding: 2px 10px; display: flex; align-items: center; justify-content: space-between; position: relative;">
        <div style="flex: 1; display: flex; justify-content: flex-start; z-index: 2;">
            <button class="btn-pill" onclick="closePage()">返回</button>
        </div>
        <span id="d-date-title" style="font-size: 16px; font-weight: 700; letter-spacing: 1px; position: absolute; left: 50%; transform: translateX(-50%); max-width: 45vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; z-index: 1;"></span>
        <div id="v-tools" style="flex: 1; display: flex; justify-content: flex-end; gap: 4px; z-index: 2;">
            <button class="btn-pill btn-save" onclick="switchToEdit()">编辑</button>
            <button class="icon-btn" onclick="openModal('more-modal')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
            </button>
        </div>
        <div id="e-tools" style="flex: 1; display: none; justify-content: flex-end; z-index: 2;">
            <button class="btn-pill btn-save" onclick="save(true)">完成</button>
        </div>
    </div>

    <div class="main-container">
        <div id="v-box">
            <h2 id="title-v" style="margin-top: 15px; font-size: 26px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; color: var(--text); letter-spacing: 0.5px; overflow-wrap: break-word; word-wrap: break-word;"></h2>
            <div id="meta-v" style="display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--sub); margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);"></div>
            <div id="content-v" style="font-size: 18px; line-height: 1.8; color: var(--text); white-space: pre-wrap; letter-spacing: 0.5px; overflow-wrap: break-word; word-wrap: break-word;"></div>
