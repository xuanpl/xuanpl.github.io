<body>
<div id="toast-container"></div>
<div id="auth-layer">
    <h2 style="font-weight:200; letter-spacing:10px; margin-bottom: 30px;">拾绪</h2>
    <input type="password" id="pwd-i" placeholder="解锁密码" autocomplete="off" onkeydown="if(event.key==='Enter') checkAuth()">
    <button class="btn-pill btn-save" style="padding: 12px 40px;" onclick="checkAuth()">解锁</button>
</div>

<div id="h-page" class="page">
<div id="ios-survival-banner" style="display: none; background: rgba(231, 76, 60, 0.1); border-bottom: 1px solid rgba(231, 76, 60, 0.2); padding: calc(10px + env(safe-area-inset-top)) 20px 10px; align-items: flex-start; gap: 12px; animation: slideDown 0.4s ease-out;">
    <svg style="width:24px; height:24px; stroke:var(--danger); fill:none; stroke-width:2; flex-shrink:0; margin-top:2px;" viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <div style="flex: 1;">
        <div style="font-size: 13px; font-weight: 700; color: var(--danger); margin-bottom: 4px;">严重的数据丢失风险</div>
        <div style="font-size: 11px; color: var(--text); opacity: 0.8; line-height: 1.5; margin-bottom: 8px;">
            在 Safari 中运行超过 7 天未使用，苹果系统将自动摧毁您的所有日记与图片。<br>
            <strong style="color:var(--text)">请务必点击底部「分享 <svg style="width:10px; height:10px; display:inline;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>」图标，选择「添加到主屏幕」。</strong>
        </div>
    </div>
    <button onclick="document.getElementById('ios-survival-banner').style.display='none'" style="background:none; border:none; color:var(--sub); padding:4px; font-size:16px;">✕</button>
</div>
    <div style="padding: calc(15px + env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <h1 style="font-size: 26px; font-weight: 300; margin: 0; letter-spacing: 2px;">拾绪</h1>
            <div id="app-main-title" style="font-size: 13px; color: var(--sub); opacity: 0.7; letter-spacing: 1px; font-weight: 600;">读取中...</div>
        </div>
        <button class="icon-btn" onclick="openModal('settings-modal')">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.13,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.2-0.06,0.47,0.12,0.61l2.03,1.58C4.84,11.36,4.81,11.68,4.81,12c0,0.32,0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.50,0.38,1.03,0.70,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
    </div>

    <div style="display: flex; gap: 20px; padding: 0 20px; margin-bottom: 10px;">
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">累计</span><span id="s-total" style="font-size: 18px; font-weight: bold;">0</span></div>
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">本月</span><span id="s-month" style="font-size: 18px; font-weight: bold;">0</span></div>
        <div><span style="font-size: 12px; color: var(--sub); opacity: 0.7; display: block;">字数统计</span><span id="s-words" style="font-size: 18px; font-weight: bold;">0</span></div>
    </div>

    <div class="cal-section">
        <div class="cal-header">
            <div id="cal-m-label" style="font-weight: 600; font-size: 18px;"></div>
            <div class="cal-ctrl" style="display: flex; background: none; padding: 3px; border-radius: 18px; gap: 2px;">
                <button style="background:none; color: var(--primary); border:none; padding: 5px 12px; font-size:18px; cursor:pointer;" onclick="moveMonth(-1)">◀</button>
                <button style="background:rgba(0,0,0,0.03); color: var(--accent); border:none; padding: 5px 12px; font-size:16px; border-radius:15px; cursor:pointer;" onclick="goToday()">今天</button>
                <button style="background:none; color: var(--primary); border:none; padding: 5px 12px; font-size:18px; cursor:pointer;" onclick="moveMonth(1)">▶</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--sub); margin-bottom: 8px; font-weight: bold;"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
        <div class="cal-grid" id="cal-g"></div>
    </div>
	
	<div style="margin: 10px 15px; padding-bottom: 0px; padding-top: 0px;">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="search-input" placeholder="搜索，或点击右侧漫游..." oninput="filterIndex()" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: var(--card); font-size: 14px; color: var(--text); outline: none;">
            
            <button class="btn-pill btn-save" style="width: 48px; height: 48px; padding: 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1);background: var(--mood-bg);color:var(--accent)" onclick="goRandom()" aria-label="漫游时光机">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 22px; height: 22px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
            </button>
        </div>
        <div id="index-list" style="margin-top:10px;"></div>
    </div>
    <div style="margin: 10px 15px; padding: 15px 18px; background: var(--card); border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.03);">
        <div class="box-header"><span id="growth-title">心绪印记</span><span id="days-count">0 天</span></div>
        <div class="growth-grid" id="growth-grid"></div>
    </div>

</div>

<div id="d-page">
    <div class="static-nav" style="min-height: 40px; padding: 2px 10px; display: flex; align-items: center; justify-content: space-between; position: relative;">
        <div style="flex: 1; display: flex; justify-content: flex-start; z-index: 2;">
            <button class="btn-pill" onclick="closePage()">返回</button>
        </div>
        <span id="d-date-title" style="font-size: 16px; font-weight: 700; letter-spacing: 1px; position: absolute; left: 50%; transform: translateX(-50%); max-width: 45vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; z-index: 1;"></span>
        <div id="v-tools" style="flex: 1; display: flex; justify-content: flex-end; gap: 4px; z-index: 2;">
            <button class="btn-pill btn-save" onclick="switchToEdit()">编辑</button>
